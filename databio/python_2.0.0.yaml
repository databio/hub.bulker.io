manifest:
  name: databio/python
  version: 2.0.0
  commands:
  - command: ipython
    docker_args: "-it"
    docker_image: "ipython/ipython"
    docker_command: ipython
  - command: pip3
    docker_image: "python:3"
  - command: python
    docker_args: "-it"
    docker_image: "python:3"
    docker_command: python
  - command: python3
    docker_args: "-it"
    docker_image: "python:3"
    docker_command: python3
